on:
  push:
    branches:
      - main

jobs:
  determine_versions:
    name: Determine versions
    runs-on: ubuntu-latest
    outputs:
      current: ${{ steps.get_versions.outputs.current }}
      new: ${{ steps.get_versions.outputs.new }}
      new_dev: ${{ steps.get_versions.outputs.new_dev }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 30
      - name: Install cocogitto
        uses: https://git.h.oluflorenzen.de/mirrors/codeberg.PurpleBooth.common-pipelines/actions/install-cocogitto@main
      - name: Get versions
        id: get_versions
        shell: bash
        run: |
          BASH_STATE_BEFORE=$(set +o)
          set -x
          cog get-version
          current=$(cog get-version 2>/dev/null)

          # Check if current version matches semver pattern
          if [[ $current =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "current=${current}" >> "$GITHUB_OUTPUT"
          else
            echo "current=" >> "$GITHUB_OUTPUT"
          fi

          cog bump --auto --dry-run || true
          new_value=$(cog bump --auto --dry-run 2>/dev/null)

          # Check if new version matches semver pattern
          if [[ $new_value =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "new=${new_value}" >> "$GITHUB_OUTPUT"
          else
            echo "new=" >> "$GITHUB_OUTPUT"
          fi

          cog bump --patch --dry-run || true
          new_dev_value=$(cog bump --patch --dry-run 2>/dev/null)
          # if the new_dev_value is empty, set it to the current version with _dev suffix
          if [ -z "${new_dev_value:+x}" ]; then
            new_dev_value="${current}"
          fi

          # Check if new_dev version matches semver pattern before adding _dev suffix
          if [[ $new_dev_value =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "new_dev=${new_dev_value}_dev" >> "$GITHUB_OUTPUT"
          else
            echo "new_dev=" >> "$GITHUB_OUTPUT"
          fi

          cat "$GITHUB_OUTPUT"
          set +x
          eval "$BASH_STATE_BEFORE"


  build:
    name: Bump version, build and publish
    runs-on: ubuntu-latest
    needs: determine_versions

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10
          fetch-tags: true
      - name: install helper-script
        run: |
          curl --fail -sS -o /usr/local/bin/forgejo-curl.sh "https://git.h.oluflorenzen.de/mirrors/forgejo-curl/raw/branch/main/forgejo-curl.sh" && chmod +x /usr/local/bin/forgejo-curl.sh
          export PATH=/usr/local/bin:$PATH
          forgejo-curl.sh --token "${{ env.FORGEJO_TOKEN }}" login ${{ env.FORGEJO_SERVER_URL }}
          forgejo-curl.sh api_json ${{ env.FORGEJO_SERVER_URL }}/api/v1/user

      - name: Install uv and set the python version
        uses: https://github.com/astral-sh/setup-uv@v6
        id: setup-uv
        with:
          python-version: "3.13"
          enable-cache: true
          prune-cache: false

      - uses: https://git.h.oluflorenzen.de/mirrors/codeberg.PurpleBooth.common-pipelines/actions/install-yq@main
        name: Install yq

      - uses: https://git.h.oluflorenzen.de/mirrors/codeberg.PurpleBooth.common-pipelines/actions/install-cocogitto@main
        name: Install cocogitto

      - name: Configure Git User
        uses: https://git.h.oluflorenzen.de/mirrors/codeberg.PurpleBooth.common-pipelines/actions/configure-git-user@main

      - name: Release with cocogitto
        uses: https://git.h.oluflorenzen.de/mirrors/codeberg.PurpleBooth.common-pipelines/actions/release-with-cog@main

      - name: Cache state
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "Cache was restored"

      - name: Set dev version
        run: uv version ${{ needs.determine_versions.outputs.new }}

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        env:
          TERM: "dumb"
        run: uv run pytest --color=yes tests

      - name: Build
        run: uv build

      - name: Publish
        env:
          UV_PUBLISH_USERNAME: finkregh
          UV_PUBLISH_PASSWORD: ${{ secrets.PACKAGE_UPLOAD_TOKEN }}
          #UV_PUBLISH_INDEX: ${{ github.server_url }}/api/packages/finkregh/pypi
          UV_PUBLISH_URL: ${{ github.server_url }}/api/packages/finkregh/pypi
        run: |
          uv publish -v

  build-container:
    runs-on: ubuntu-latest
    needs:
        - determine_versions
        - build
    env:
      DOCKER_HOST: tcp://docker_dind:2375
    container:
      image: node:24-bookworm
      options: >-
        --privileged
      env:
        DOCKER_HOST: tcp://docker_dind:2375

    steps:
      - name: Get server domain
        id: server_domain
        shell: bash
        run: |
          echo "server_domain=$(echo '${{ github.api_url }}' | awk -F'[/:]' '{print $4}')" >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 30
      - name: Install uv and set the python version
        uses: https://github.com/astral-sh/setup-uv@v6
        id: setup-uv
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          prune-cache: false
      - name: Set version
        run: uv version ${{ needs.determine_versions.outputs.new }}

      - name: Install Docker
        run: |
          apt-get update
          apt-get install -y ca-certificates curl gnupg
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            tee /etc/apt/sources.list.d/docker.list > /dev/null
          apt-get update
          apt-get install -y docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.server_domain.outputs.server_domain }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PACKAGE_UPLOAD_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          tags: ${{ steps.server_domain.outputs.server_domain }}/${{ github.repository }}:${{ needs.determine_versions.outputs.new }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
