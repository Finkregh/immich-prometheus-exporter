branch_whitelist = ["main"]

ignore_merge_commits = true

pre_bump_hooks = [
    "uv version {{version}}"
]

# A list of command to run AFTER creating a version
post_bump_hooks = [
    "git push",
    "git push origin {{version}}"
]

[commit_types]
chore = { bump_patch = true }
revert = { bump_minor = true }
docs = { bump_patch = true }
style = { bump_patch = true }
perf = { bump_patch = true }

# Changelog configuration
[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "https://git.h.oluflorenzen.de"
repository = "immich-prometheus-exporter"
owner = "finkregh"
